<!DOCTYPE html>
<html>
<head>
    <title>Appointments</title>
</head>
<body>

<h2>Appointments List</h2>

<a href="/appointments/book/">Book Appointment</a>

<table border="1">
    <tr>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Time</th>
        <th>Reason</th>
        <th>Action</th>
    </tr>

    {% for a in appointments %}
    <tr>
        <td>{{ a.patient }}</td>
        <td>{{ a.doctor }}</td>
        <td>{{ a.appointment_date }}</td>
        <td>{{ a.appointment_time }}</td>
        <td>{{ a.reason }}</td>
        <td>
            <a href="/appointments/delete/{{ a.id }}/">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
