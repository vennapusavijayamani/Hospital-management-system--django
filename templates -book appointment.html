<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f8fb;
        }

        .container{
            width:450px;
            margin:40px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            color:#0077b6;
        }

        input,select,textarea{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            background:#28a745;
            color:white;
            padding:12px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

<h2>🏥 Book Appointment</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">
Book Appointment
</button>

</form>

<br>

<a href="{% url 'appointments' %}">
⬅ Back
</a>

</div>

</body>
</html>
