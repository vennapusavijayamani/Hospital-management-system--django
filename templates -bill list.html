<!DOCTYPE html>
<html>
<head>
    <title>Billing List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Billing List</h2>

<a href="/billing/add/" class="btn btn-success mb-3">
    Add Bill
</a>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Total Amount</th>
            <th>Appointment Date</th>
        </tr>
    </thead>

    <tbody>
    {% for bill in bills %}
        <tr>
            <td>{{ bill.id }}</td>
            <td>{{ bill.patient }}</td>
            <td>{{ bill.doctor }}</td>
            <td>{{ bill.total_amount }}</td>
            <td>{{ bill.appointment_date }}</td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="5">No Bills Found</td>
        </tr>
    {% endfor %}
    </tbody>
</table>

</div>

</body>
</html>
