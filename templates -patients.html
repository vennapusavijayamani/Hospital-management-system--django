<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#eef7ff;">

<div class="container mt-5">

<h2 class="text-center text-primary mb-4">
Patient Records
</h2>
<form method="GET" class="mb-3">

    <div class="input-group">

        <input
            type="text"
            name="q"
            class="form-control"
            placeholder="Search by Name or Disease">

        <button class="btn btn-primary">
            Search
        </button>

    </div>

</form>

<a href="/add/" class="btn btn-success mb-3">
Add New Patient
</a>

<table class="table table-bordered table-striped">

<thead class="table-primary">

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
<th>Disease</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for patient in data %}

<tr>

<td>{{ patient.id }}</td>
<td>{{ patient.name }}</td>
<td>{{ patient.age }}</td>
<td>{{ patient.gender }}</td>
<td>{{ patient.phone }}</td>
<td>{{ patient.disease }}</td>
<td>
    <a href="/edit/{{ patient.id }}/" class="btn btn-sm">
    Edit
    </a>
    /
    <a href="/delete/{{ patient.id }}/" class="btn  btn-sm">
    Delete
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
