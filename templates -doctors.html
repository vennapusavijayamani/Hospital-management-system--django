<!DOCTYPE html>
<html>
<head>
    <title>Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#eef7ff;">

<div class="container mt-5">

<h2 class="text-primary">Doctors List</h2>

<a href="/doctors/add/" class="btn btn-success mb-3">
    Add Doctor
</a>

<table class="table table-bordered table-striped">
    <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Phone</th>
            <th>Email</th>
        </tr>
    </thead>

    <tbody>
    {% for doctor in data %}
        <tr>
            <td>{{ doctor.id }}</td>
            <td>{{ doctor.name }}</td>
            <td>{{ doctor.specialization }}</td>
            <td>{{ doctor.phone }}</td>
            <td>{{ doctor.email }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>

</div>

</body>
</html>
